<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sign-up.css">
    <title>Login</title>
</head>
<body>
    <header>
        <div class="logo"><img src="../assets/olho-que-ve-tudo.png" alt="Logo Artis"></div>
        <nav class="navigation">
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="feed.html">Feed</a>
            <a href="profile.html">Perfil</a>
            <a href="exercise.html">Exercício</a>
            <a href="sign-up.html" class="btn-login">Login</a>
        </nav>
    </header>
    <div class="wrapper">
        <div class="form-box login">
            <h2>Login</h2>
            <form id="input-login-form" action="#">
                <div class="input-box">
                    <span class="icon"><ion-icon name="mail"></ion-icon></span>
                    <input type="email" id="login-email"required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="password" id="login-password" required>
                    <label>Senha</label>
                </div>
                <div class="forgot">
                    <a href="#">Esqueceu a senha?</a>
                </div>
                <br>
                <div class="caixa">
                    <button type="submit" class="btn">Login</button>
                    <button type="reset" class="btn-limpar">Limpar</button>
                </div>
                <div class="login-register">
                    <p>Ainda não tem uma conta? <a href="#" class="register-link">Cadastre-se!</a></p>
                </div>
                <p id="msg-submit-login"></p>
            </form>
        </div>

        <div class="form-box register">
            <h2>Cadastro</h2>
            <form id="input-register-form" action="#">
                <div class="input-box">
                    <span class="icon">
                        <ion-icon name="person"></ion-icon>
                    </span>
                    <input id="register-username" type="text" required>
                    <label>Usuário</label>
                </div>
                <div class="input-box">
                    <span class="icon">
                        <ion-icon name="mail"></ion-icon>
                    </span>
                    <input id="register-email" type="email" required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <span class="icon">
                        <ion-icon name="lock-closed"></ion-icon>
                    </span>
                    <input id="register-password" type="password" required>
                    <label>Senha</label>
                </div>
                <div class="forgot">
                    <label><input id="termos" type="checkbox">Eu li e concordo com os termos de uso</label>
                </div>
                <br>
                <div class="caixa">
                    <button type="submit" class="btn">Cadastrar</button>
                    <button type="reset" class="btn-limpar">Limpar</button>
                </div>
                <div class="login-register">
                    <p>Já tem uma conta? <a href="#" class="login-link">Login</a></p>
                </div>
                <p id="msg-erro-termos" style="color: red;"></p>
                <p id="msg-submit-sucess" style="color: green;"></p>
            </form>
        </div>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="sign-up.js"></script>
</body>
</html>
