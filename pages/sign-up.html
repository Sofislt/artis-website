<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sign-up.css">
    <title>Login</title>
</head>
<body>
    <header>
        <div class="logo"><img src="../assets/olho-que-ve-tudo.png" alt="Logo Artis"></div>
        <nav class="navigation">
            <a href="../index.html">Home</a>
            <a href="#">Explore</a>
            <a href="#">Feed</a>
            <a href="#">Perfil</a>
            <a href="pages/sign-up.html" class="btn-login">Login</a>
        </nav>
    </header>
    <div class="wrapper">
        <div class="form-box login">
            <h2>Login</h2>
            <form action="#">
                <div class="input-box">
                    <span class="icon"><ion-icon name="mail"></ion-icon></span>
                    <input type="email" id="email"required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="password" id="senha" required>
                    <label>Senha</label>
                </div>
                <div class="forgot">
                    <a href="#">Esqueceu a senha?</a>
                </div>
                <br>
                <div class="caixa">
                    <button type="submit" class="btn" onClick="validarLogin(); return false;">Login</button>
                    <button type="reset" class="btn-limpar">Limpar</button>
                </div>
                <div class="login-register">
                    <p>Ainda não tem uma conta? <a href="#" class="register-link">Cadastre-se!</a></p>
                </div>
            </form>
        </div>

        <div class="form-box register">
            <h2>Cadastro</h2>
            <form action="#">
                <div class="input-box">
                    <span class="icon">
                        <ion-icon name="person"></ion-icon>
                    </span>
                    <input type="text" required>
                    <label>Usuário</label>
                </div>
                <div class="input-box">
                    <span class="icon">
                        <ion-icon name="mail"></ion-icon>
                    </span>
                    <input type="email" required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <span class="icon">
                        <ion-icon name="lock-closed"></ion-icon>
                    </span>
                    <input type="password" required>
                    <label>Senha</label>
                </div>
                <div class="forgot">
                    <label><input type="checkbox">Eu li e concordo com os termos de uso</label>
                </div>
                <br>
                <div class="caixa">
                    <button type="submit" class="btn">Cadastrar</button>
                    <button type="reset" class="btn-limpar">Limpar</button>
                </div>
                <div class="login-register">
                    <p>Já tem uma conta? <a href="#" class="login-link">Login</a></p>
                </div>
            </form>
        </div>
    </div>

    <script>
        const wrapper = document.querySelector('.wrapper');
        const loginLink = document.querySelector('.login-link');
        const registerLink = document.querySelector('.register-link');

        registerLink.addEventListener('click', ()=> {
            wrapper.classList.add('active');
        })

        loginLink.addEventListener('click', ()=> {
            wrapper.classList.remove('active');})
    </script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
